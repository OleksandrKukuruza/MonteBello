<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Monte Bello</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

<div class="login-page">

    <div class="login-image">
        <div class="overlay">
            <h1>Monte Bello</h1>
            <p>Italian flavors, warm evenings and unforgettable moments.</p>
        </div>
    </div>

    <div class="login-form-side">
        <a href="index.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>

        <div class="login-box">

            <div class="auth-switch">
                <button class="auth-tab active" id="loginTab">Log In</button>
                <button class="auth-tab" id="signupTab">Sign Up</button>
                <div class="auth-slider"></div>
            </div>
        
            <!-- LOGIN -->
            <div class="auth-form active" id="loginFormWrap">
                <h2>Welcome back</h2>
                <p>Sign in to manage bookings, orders and favorites.</p>
        
                <form id="loginForm">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                   </div>
        
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
        
                    <button type="submit" class="login-btn">Log In</button>


                    
                </form>
                
            </div>
        
            <!-- SIGN UP -->
            <div class="auth-form" id="signupFormWrap">
                <h2>Create account</h2>
                <p>Join Monte Bello experience.</p>
        
                <form id="registerForm">
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" id="registerName" required>
                    </div>
        
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" required>
                    </div>
        
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" required>
                    </div>
        
                    <button type="submit" class="login-btn">Create account</button>
                    
                </form>

            </div>
            <button type="button" class="google-btn googleLoginBtn">
                Continue with Google
            </button>
            
        </div>

        
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
        
        <script src="js/firebase.js"></script>
        <script src="js/auth.js"></script>
        
<script>




const loginTab = document.getElementById('loginTab');
const signupTab = document.getElementById('signupTab');

const loginFormWrap = document.getElementById('loginFormWrap');
const signupFormWrap = document.getElementById('signupFormWrap');

const authSwitch = document.querySelector('.auth-switch');

function showLogin() {
    loginFormWrap.classList.add('active');
    signupFormWrap.classList.remove('active');

    loginTab.classList.add('active');
    signupTab.classList.remove('active');

    authSwitch.classList.remove('signup');
}

function showSignup() {
    signupFormWrap.classList.add('active');
    loginFormWrap.classList.remove('active');

    signupTab.classList.add('active');
    loginTab.classList.remove('active');

    authSwitch.classList.add('signup');
}

loginTab.addEventListener('click', showLogin);
signupTab.addEventListener('click', showSignup);

// стартово
showLogin();

</script>

    
</body>
</html>
